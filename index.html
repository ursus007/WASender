<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXAI | Enterprise WhatsApp Suite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 0% 0%, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: #38bdf8;
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .gradient-btn {
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .iti { width: 100%; }
        .iti__country-list { background-color: #1e293b; border: 1px solid #334155; color: white; }
        
        input, select, textarea {
            background: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 14px !important;
        }

        .status-pill { padding: 2px 10px; border-radius: 99px; font-size: 0.65rem; font-weight: 800; }
        .status-waiting { background: #334155; color: #94a3b8; }
        .status-success { background: #065f46; color: #34d399; }
        .status-error { background: #7f1d1d; color: #f87171; }

        .type-active { border: 2px solid #38bdf8; background: rgba(56, 189, 248, 0.1); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-white rounded-3xl flex items-center justify-center">
                    <span class="text-blue-600 font-black text-3xl">NX</span>
                </div>
                <div>
                    <h1 class="text-4xl font-extrabold tracking-tight italic">NX<span class="text-blue-400 not-italic">AI</span></h1>
                    <p class="text-slate-500 text-xs font-bold tracking-[0.3em] uppercase">Global Messaging Core</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6">
                <div class="glass-card p-8">
                    <h2 class="text-sm font-black text-blue-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                        <i class="bi bi-person-plus-fill"></i> 01. Destino
                    </h2>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button onclick="setMode('individual')" id="btn-mode-ind" class="glass-card p-4 text-center type-active">
                            <i class="bi bi-phone text-2xl mb-1 block"></i>
                            <span class="text-[10px] font-bold uppercase">Individual</span>
                        </button>
                        <button onclick="setMode('bulk')" id="btn-mode-bulk" class="glass-card p-4 text-center opacity-50">
                            <i class="bi bi-layers text-2xl mb-1 block"></i>
                            <span class="text-[10px] font-bold uppercase">Masivo</span>
                        </button>
                    </div>

                    <div id="ind-target" class="mb-6">
                        <input type="tel" id="phone" class="w-full p-4">
                    </div>

                    <div id="bulk-target" class="mb-6 hidden">
                        <div class="border-2 border-dashed border-slate-700 rounded-2xl p-6 text-center hover:border-blue-500 cursor-pointer bg-black/20" onclick="document.getElementById('file').click()">
                            <input type="file" id="file" class="hidden" accept=".xlsx, .xls, .csv">
                            <i class="bi bi-cloud-upload text-2xl text-slate-500 mb-2 block"></i>
                            <p id="file-name" class="text-xs text-slate-400">Click para cargar Excel</p>
                        </div>
                    </div>

                    <h2 class="text-sm font-black text-blue-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                        <i class="bi bi-chat-left-dots-fill"></i> 02. Contenido
                    </h2>

                    <select id="msgType" class="w-full p-4 font-bold mb-6">
                        <option value="template_vyv">🚀 Plantilla: vyv_1 (3 Variables + Logo)</option>
                    </select>

                    <button id="sendBtn" onclick="initProcess()" class="w-full gradient-btn mt-10 py-5 rounded-2xl font-black text-sm uppercase tracking-[0.2em] transition-all">
                        <i class="bi bi-lightning-fill mr-2"></i> Transmitir Mensaje
                    </button>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="glass-card p-8 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-sm font-black text-blue-400 uppercase tracking-widest flex items-center gap-2">
                            <i class="bi bi-gpu-card"></i> Status Log
                        </h2>
                        <div id="counter" class="font-mono text-xs text-slate-500">READY</div>
                    </div>
                    <div id="logs" class="flex-grow space-y-4 overflow-y-auto max-h-[600px] pr-4 custom-scroll">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://nxlink-backend.ursus006.workers.dev';
        let currentMode = 'individual';
        let iti;

        window.onload = () => {
            iti = window.intlTelInput(document.querySelector("#phone"), {
                initialCountry: "pe",
                separateDialCode: true,
                utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/utils.js",
            });
        };

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('ind-target').classList.toggle('hidden', mode !== 'individual');
            document.getElementById('bulk-target').classList.toggle('hidden', mode === 'individual');
            document.getElementById('btn-mode-ind').style.opacity = mode === 'individual' ? '1' : '0.5';
            document.getElementById('btn-mode-bulk').style.opacity = mode === 'bulk' ? '1' : '0.5';
        }

        async function initProcess() {
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            let contacts = [];

            if (currentMode === 'individual') {
                const fullNumber = iti.getNumber();
                if (!iti.isValidNumber()) { alert("Número inválido"); btn.disabled = false; return; }
                contacts.push({ phone: fullNumber.replace('+', ''), name: 'Cliente' });
            } else {
                const fileInput = document.getElementById('file');
                if (!fileInput.files.length) { alert("Sube un Excel"); btn.disabled = false; return; }
                const data = await fileInput.files[0].arrayBuffer();
                const workbook = XLSX.read(data);
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                contacts = json.map(r => ({
                    phone: String(r.phone || r.telefono || '').replace(/\D/g, ''),
                    name: r.name || r.nombre || 'Cliente'
                })).filter(c => c.phone.length > 5);
            }

            document.getElementById('logs').innerHTML = '';
            let ok = 0;

            for (let c of contacts) {
                renderLog(c.phone, 'Sincronizando...');
                try {
                    // ESTRUCTURA EXACTA SEGÚN LOG DE POSTMAN
                    const payload = { 
                        to: c.phone,
                        type: "template",
                        templateName: "vyv_1",
                        components: [
                            {
                                type: "header",
                                parameters: [
                                    {
                                        type: "image",
                                        image: { link: "https://i.postimg.cc/W3D7tWCX/logo.png" }
                                    }
                                ]
                            },
                            {
                                type: "body",
                                parameters: [
                                    { type: "text", text: c.name }, // Variable 1
                                    { type: "text", text: "Carlos" }, // Variable 2 (Ejemplo)
                                    { type: "text", text: "Less" }    // Variable 3 (Ejemplo)
                                ]
                            }
                        ]
                    };

                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const result = await res.json();
                    if (res.ok && result.code === 0) {
                        ok++;
                        updateLog(c.phone, 'Entregado a WhatsApp', 'success', 'bi-check2-all');
                    } else {
                        updateLog(c.phone, result.message || 'Error en API', 'error', 'bi-exclamation-triangle');
                    }
                } catch (e) {
                    updateLog(c.phone, 'Fallo de Red', 'error', 'bi-wifi-off');
                }
                document.getElementById('counter').innerText = `${ok}/${contacts.length}`;
            }
            btn.disabled = false;
        }

        function renderLog(phone, msg) {
            const div = document.createElement('div');
            div.id = `log-${phone}`;
            div.className = 'glass-card p-4 flex justify-between items-center border-l-4 border-blue-500 animate-pulse';
            div.innerHTML = `<div><p class="text-xs font-bold">+${phone}</p><p id="txt-${phone}" class="text-[10px] text-slate-500">${msg}</p></div><div id="badge-${phone}" class="status-pill status-waiting">SENDING</div>`;
            document.getElementById('logs').prepend(div);
        }

        function updateLog(phone, msg, status, icon) {
            const row = document.getElementById(`log-${phone}`);
            const badge = document.getElementById(`badge-${phone}`);
            const text = document.getElementById(`txt-${phone}`);
            if(!row) return;
            row.classList.remove('animate-pulse');
            row.style.borderLeftColor = status === 'success' ? '#10b981' : '#ef4444';
            badge.className = `status-pill status-${status}`;
            badge.innerHTML = `<i class="bi ${icon}"></i> ${status.toUpperCase()}`;
            text.innerText = msg;
        }

        document.getElementById('file').onchange = (e) => {
            if(e.target.files.length) document.getElementById('file-name').innerText = e.target.files[0].name;
        };
    </script>
</body>
</html>
