<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXAI | Enterprise WhatsApp Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: #38bdf8;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.1);
        }

        .gradient-text {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary-nx {
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary-nx:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        /* Status colors */
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-waiting { background: #334155; }
        .status-success { background: #059669; }
        .status-error { background: #dc2626; }

        input, select, textarea {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 12px !important;
        }

        input:focus { border-color: #38bdf8 !important; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-lg">
                    <span class="text-blue-600 font-bold text-2xl">NX</span>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight">NX<span class="gradient-text">AI</span></h1>
                    <p class="text-slate-400 text-sm font-light">Next-Gen Communications Peru</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="text-right hidden md:block">
                    <p class="text-xs text-slate-500 uppercase font-bold">API Status</p>
                    <p class="text-green-400 text-sm flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> Conectado a NXCloud
                    </p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 space-y-6">
                <div class="glass-card p-6">
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                        <i class="bi bi-rocket-takeoff text-blue-400"></i> Configurar Campaña
                    </h2>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-400 mb-2">Base de Contactos (CSV)</label>
                        <div class="border-2 border-dashed border-slate-700 rounded-2xl p-4 text-center hover:border-blue-500 transition-colors cursor-pointer" id="dropZone">
                            <i class="bi bi-file-earmark-spreadsheet text-3xl text-slate-500 mb-2 block"></i>
                            <input type="file" id="csvFile" class="hidden" accept=".csv">
                            <p class="text-sm text-slate-300" id="fileName">Arrastra tu CSV o haz clic aquí</p>
                            <p class="text-[10px] text-slate-500 mt-1">Formato: phone, name</p>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-400 mb-2">Canal de Envío</label>
                        <select id="msgType" class="w-full p-3 focus:ring-2 focus:ring-blue-500 transition-all" onchange="toggleForm()">
                            <option value="template">🚀 HSM Template (Abre Ventana 24h)</option>
                            <option value="text">💬 Mensaje de Sesión (Texto)</option>
                            <option value="media">🖼️ Mensaje Rich Media (Imagen/Doc)</option>
                        </select>
                    </div>

                    <div id="dynamicForm" class="space-y-4">
                        <div id="tplSection">
                            <label class="block text-sm font-medium text-slate-400 mb-1">Nombre del Template</label>
                            <input type="text" id="tplName" class="w-full p-3" placeholder="ej: bienvenida_nx">
                        </div>
                        
                        <div id="bodySection" class="hidden">
                            <label class="block text-sm font-medium text-slate-400 mb-1">Cuerpo del Mensaje</label>
                            <textarea id="msgBody" rows="4" class="w-full p-3" placeholder="Hola {{name}}, bienvenido..."></textarea>
                        </div>
                    </div>

                    <button onclick="processCampaing()" class="w-full btn-primary-nx mt-8 py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2">
                        <i class="bi bi-lightning-fill"></i> LANZAR CAMPAÑA
                    </button>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="glass-card p-6 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-semibold flex items-center gap-2">
                            <i class="bi bi-activity text-green-400"></i> Monitor en Vivo
                        </h2>
                        <div class="flex gap-2">
                            <span class="status-badge status-waiting" id="countPending">Esperando...</span>
                        </div>
                    </div>

                    <div class="flex-grow overflow-auto max-h-[600px] space-y-3 pr-2 custom-scrollbar" id="logContainer">
                        <div class="text-center py-12 text-slate-500">
                            <i class="bi bi-inbox text-5xl mb-4 block opacity-20"></i>
                            <p>No hay actividad reciente. Carga una base para empezar.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lógica de UI
        function toggleForm() {
            const type = document.getElementById('msgType').value;
            const tplSection = document.getElementById('tplSection');
            const bodySection = document.getElementById('bodySection');

            if (type === 'template') {
                tplSection.classList.remove('hidden');
                bodySection.classList.add('hidden');
            } else {
                tplSection.classList.add('hidden');
                bodySection.classList.remove('hidden');
            }
        }

        // Manejo de Archivo
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('csvFile');
        
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const name = e.target.files[0].name;
            document.getElementById('fileName').innerText = `Archivo cargado: ${name}`;
            document.getElementById('fileName').classList.add('text-blue-400');
        };

        // Simulación de Envío Masivo (Integración con Worker)
        async function processCampaing() {
            const file = fileInput.files[0];
            if (!file) return alert("Por favor carga un CSV");

            const reader = new FileReader();
            reader.onload = async (e) => {
                const text = e.target.result;
                const rows = text.split('\n').slice(1); // Ignorar cabecera
                const logContainer = document.getElementById('logContainer');
                logContainer.innerHTML = ''; // Limpiar logs

                for (let row of rows) {
                    if (!row.trim()) continue;
                    const [phone, name] = row.split(',');
                    
                    addLog(phone, 'Enviando...', 'waiting');
                    
                    // Llamada real al Worker
                    try {
                        const response = await fetch('TU_URL_DEL_WORKER', {
                            method: 'POST',
                            body: JSON.stringify({
                                to: phone.trim(),
                                type: document.getElementById('msgType').value,
                                message: document.getElementById('msgBody').value.replace('{{name}}', name),
                                templateName: document.getElementById('tplName').value,
                                components: [{ type: "body", parameters: [{ type: "text", text: name }] }]
                            })
                        });

                        const data = await response.json();
                        
                        if (response.ok) {
                            updateLog(phone, 'Éxito', 'success', 'bi-check-all');
                        } else {
                            // MANEJO DE ERROR DE IMPACTO
                            updateLog(phone, data.message || 'Error', 'error', 'bi-shield-slash-fill');
                        }
                    } catch (err) {
                        updateLog(phone, 'Fallo de Red', 'error', 'bi-wifi-off');
                    }
                }
            };
            reader.readAsText(file);
        }

        function addLog(phone, msg, status) {
            const logContainer = document.getElementById('logContainer');
            const div = document.createElement('div');
            div.id = `log-${phone}`;
            div.className = 'glass-card p-4 flex justify-between items-center border-l-4 border-slate-500';
            div.innerHTML = `
                <div>
                    <p class="text-sm font-bold">${phone}</p>
                    <p class="text-xs text-slate-400" id="msg-${phone}">${msg}</p>
                </div>
                <div id="badge-${phone}" class="status-badge status-waiting">Procesando</div>
            `;
            logContainer.prepend(div);
        }

        function updateLog(phone, msg, status, icon) {
            const badge = document.getElementById(`badge-${phone}`);
            const text = document.getElementById(`msg-${phone}`);
            const card = document.getElementById(`log-${phone}`);
            
            badge.className = `status-badge status-${status}`;
            badge.innerHTML = `<i class="bi ${icon}"></i> ${status.toUpperCase()}`;
            text.innerText = msg;
            
            if (status === 'success') card.style.borderLeftColor = '#059669';
            if (status === 'error') card.style.borderLeftColor = '#dc2626';
        }
    </script>
</body>
</html>
