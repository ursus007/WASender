<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXAI | Enterprise WhatsApp Suite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at 0% 0%, #0f172a 0%, #1e293b 100%); color: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; transition: all 0.4s ease; }
        .glass-card:hover { border-color: #38bdf8; background: rgba(255, 255, 255, 0.04); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .gradient-btn { background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .iti { width: 100%; }
        input, select, textarea { background: rgba(15, 23, 42, 0.8) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; border-radius: 14px !important; }
        .status-pill { padding: 2px 10px; border-radius: 99px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .status-waiting { background: #334155; color: #94a3b8; }
        .status-success { background: #065f46; color: #34d399; }
        .status-error { background: #7f1d1d; color: #f87171; }
        .type-active { border: 2px solid #38bdf8; background: rgba(56, 189, 248, 0.1); }
        
        /* WhatsApp Simulator */
        .wa-chat-bg { background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; border-radius: 24px; padding: 20px; border: 6px solid #0f172a; width: 100%; max-width: 340px; margin: 0 auto; }
        .wa-bubble { background: white; border-radius: 0 15px 15px 15px; padding: 10px; color: #333; font-size: 13px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .wa-media-box { width: 100%; border-radius: 10px; margin-bottom: 8px; overflow: hidden; background: #eee; display: flex; align-items: center; justify-content: center; min-height: 120px; }
        .wa-btn-preview { border-top: 1px solid #eee; margin: 8px -10px -10px -10px; padding: 10px; text-align: center; color: #00a5f4; font-weight: 600; font-size: 13px; }
        .wa-variable { color: #0ea5e9; font-weight: bold; background: rgba(14, 165, 233, 0.1); border-radius: 3px; padding: 0 2px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-white rounded-3xl flex items-center justify-center shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                    <span class="text-blue-600 font-black text-3xl">NX</span>
                </div>
                <div>
                    <h1 class="text-4xl font-extrabold tracking-tight italic">NX<span class="text-blue-400 not-italic">AI</span> Studio</h1>
                    <p class="text-slate-500 text-xs font-bold tracking-[0.3em] uppercase">Enterprise Messaging HUB</p>
                </div>
            </div>
            <div class="flex gap-4 items-center glass-card px-6 py-3">
                <div class="text-right">
                    <p class="text-[10px] text-slate-500 font-bold uppercase italic">Status Motor</p>
                    <p id="counter" class="text-white font-mono text-lg italic font-black">IDLE</p>
                </div>
                <div class="h-8 w-[1px] bg-slate-700"></div>
                <div class="flex items-center gap-2 text-green-400 font-bold text-sm">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span> API ONLINE
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-8">
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button onclick="setMode('individual')" id="btn-mode-ind" class="glass-card p-4 text-center type-active">
                            <i class="bi bi-phone text-2xl mb-1 block"></i>
                            <span class="text-[10px] font-bold uppercase">Individual</span>
                        </button>
                        <button onclick="setMode('bulk')" id="btn-mode-bulk" class="glass-card p-4 text-center opacity-50">
                            <i class="bi bi-layers text-2xl mb-1 block"></i>
                            <span class="text-[10px] font-bold uppercase">Masivo</span>
                        </button>
                    </div>

                    <div id="ind-target" class="mb-6">
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 italic">Número WhatsApp</label>
                        <input type="tel" id="phone" class="w-full p-4">
                    </div>

                    <div id="bulk-target" class="mb-6 hidden">
                        <div class="border-2 border-dashed border-slate-700 rounded-2xl p-6 text-center cursor-pointer bg-black/20" onclick="document.getElementById('file').click()">
                            <input type="file" id="file" class="hidden" accept=".xlsx, .xls">
                            <i class="bi bi-file-earmark-spreadsheet text-2xl text-slate-500 mb-2 block"></i>
                            <p id="file-name" class="text-xs text-slate-400 italic font-mono uppercase">Subir Base de Datos</p>
                        </div>
                    </div>

                    <div class="h-[1px] bg-slate-800 my-8"></div>

                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 italic">Seleccionar Mensaje</label>
                    <select id="msgType" class="w-full p-4 font-bold mb-6" onchange="toggleContentFields()">
                        <optgroup label="Apertura (HSM Templates)">
                            <option value="vyv_1">🚀 vyv_1 (Imagen + 3 Vars)</option>
                            <option value="promo_video_nxai">🎥 promo_video_nxai (Video)</option>
                            <option value="nxai_cta_web_v1">🌐 nxai_cta_web_v1 (CTA Web)</option>
                            <option value="nxai_cta_phone_v1">📞 nxai_cta_phone_v1 (CTA Phone)</option>
                            <option value="nxai_solutions_v4">Carousel: nxai_solutions_v4</option>
                            <option value="nxai_interactivo_v1">🔘 nxai_interactivo_v1 (Quick Buttons)</option>
                            <option value="presentacion_3cx_pdf">📄 presentacion_3cx_pdf (Documento)</option>
                            <option value="tpl_generic">📝 Plantilla Manual (JSON)</option>
                        </optgroup>
                        <optgroup label="Sesión (Conversación Abierta)">
                            <option value="text">💬 Solo Texto</option>
                            <option value="image">🖼️ Imagen (URL)</option>
                            <option value="document">📄 PDF (URL)</option>
                            <option value="video_session">🎥 Video (ID FB)</option>
                            <option value="audio_session">🎵 Audio (ID FB)</option>
                        </optgroup>
                    </select>

                    <div id="content-fields" class="space-y-4">
                        <div id="group-template" class="hidden">
                            <label class="block text-[10px] font-black text-slate-500 uppercase mb-1 italic">Nombre de la Plantilla</label>
                            <input type="text" id="tplName" class="w-full p-4 text-sm font-mono" placeholder="ej: mi_template_v1">
                        </div>

                        <div id="group-media">
                            <label id="label-media" class="block text-[10px] font-black text-slate-500 uppercase mb-1 italic">URL o ID de Multimedia</label>
                            <input type="text" id="mediaUrl" oninput="updatePreview()" class="w-full p-4 text-xs font-mono" placeholder="https:// o ID de Facebook">
                        </div>

                        <div id="group-text" class="hidden">
                            <label id="label-body" class="block text-[10px] font-black text-slate-500 uppercase mb-1 italic">Cuerpo / Caption</label>
                            <textarea id="body" rows="3" oninput="updatePreview()" class="w-full p-4 text-sm" placeholder="Usa {{name}} para personalizar"></textarea>
                        </div>

                        <div id="vars-container" class="space-y-3"></div>
                    </div>

                    <button id="sendBtn" onclick="initProcess()" class="w-full gradient-btn mt-10 py-5 rounded-2xl font-black text-sm uppercase tracking-widest transition-all active:scale-95">
                        <i class="bi bi-lightning-fill mr-2"></i> Transmitir Ahora
                    </button>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="sticky top-10">
                    <h2 class="text-center text-[10px] font-black text-slate-500 uppercase mb-6 italic tracking-widest">Vista Previa del Dispositivo</h2>
                    <div class="wa-chat-bg">
                        <div class="wa-bubble">
                            <div id="preview-media" class="wa-media-box"></div>
                            <div id="preview-text"></div>
                            <div id="preview-btns" class="flex flex-col"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="glass-card p-8 h-[700px] flex flex-col">
                    <h2 class="text-sm font-black text-blue-400 uppercase mb-6 italic flex items-center gap-2">
                        <i class="bi bi-terminal"></i> Salida de Consola
                    </h2>
                    <div id="logs" class="flex-grow space-y-4 overflow-y-auto pr-2 custom-scroll">
                        <div class="text-center py-20 opacity-10">
                            <i class="bi bi-broadcast text-6xl block mb-4"></i>
                            <p class="font-mono text-sm uppercase italic">Esperando acción...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://nxlink-backend.ursus006.workers.dev';
        let currentMode = 'individual';
        let iti;

        // Configuración Maestra de Plantillas y Sesiones
        const MASTER_CONFIG = {
            'vyv_1': { header: 'image', vars: ['Nombre', 'Vendedor', 'Empresa'], text: "Hola {{1}}, soy {{2}} de {{3}}, te adjunto la info solicitada.", btns: ['Ver Propuesta'] },
            'promo_video_nxai': { header: 'video', vars: ['Nombre'], text: "Hola {{1}}, ¡mira este video exclusivo de nuestras soluciones!", btns: ['Agendar Demo'] },
            'nxai_cta_web_v1': { header: null, vars: ['Nombre'], text: "Hola {{1}}, visita nuestra web para conocer más detalles.", btns: ['🌐 Ir al Sitio'] },
            'nxai_cta_phone_v1': { header: null, vars: ['Nombre'], text: "Hola {{1}}, ¿prefieres una atención telefónica directa?", btns: ['📞 Llamar Ahora'] },
            'nxai_solutions_v4': { header: 'image', vars: ['Nombre'], text: "Explora nuestro portafolio de soluciones, {{1}}.", btns: ['Ver Catálogo', 'Hablar con Asesor'] },
            'nxai_interactivo_v1': { header: null, vars: ['Nombre'], text: "¿Deseas que un especialista te contacte hoy mismo, {{1}}?", btns: ['Sí, por favor', 'No por ahora'] },
            'presentacion_3cx_pdf': { header: 'document', vars: ['Nombre'], text: "Hola {{1}}, te adjunto la presentación técnica de 3CX.", btns: ['Descargar PDF'] },
            'text': { header: null, isSession: true },
            'image': { header: 'image', isSession: true },
            'document': { header: 'document', isSession: true },
            'video_session': { header: 'video', isSession: true, useId: true, caption: "Instalar extensión NXLink" },
            'audio_session': { header: 'audio', isSession: true, useId: true }
        };

        window.onload = () => {
            iti = window.intlTelInput(document.querySelector("#phone"), { initialCountry: "pe", separateDialCode: true });
            toggleContentFields();
        };

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('ind-target').classList.toggle('hidden', mode !== 'individual');
            document.getElementById('bulk-target').classList.toggle('hidden', mode === 'individual');
            document.getElementById('btn-mode-ind').classList.toggle('type-active', mode === 'individual');
            document.getElementById('btn-mode-bulk').classList.toggle('type-active', mode === 'bulk');
            document.getElementById('btn-mode-ind').style.opacity = mode === 'individual' ? '1' : '0.5';
            document.getElementById('btn-mode-bulk').style.opacity = mode === 'bulk' ? '1' : '0.5';
        }

        function toggleContentFields() {
            const type = document.getElementById('msgType').value;
            const config = MASTER_CONFIG[type] || {};
            
            document.getElementById('group-template').classList.toggle('hidden', type !== 'tpl_generic');
            document.getElementById('group-media').classList.toggle('hidden', !config.header);
            document.getElementById('group-text').classList.toggle('hidden', !config.isSession && type !== 'tpl_generic');
            
            // Ajuste de Etiquetas Dinámicas
            const labelMedia = document.getElementById('label-media');
            const labelBody = document.getElementById('label-body');
            const mediaInput = document.getElementById('mediaUrl');

            if (config.useId) {
                labelMedia.innerText = "ID de Facebook (Media ID)";
                mediaInput.placeholder = "ej: 929780379973389";
                if(type === 'video_session') {
                    document.getElementById('group-text').classList.remove('hidden');
                    labelBody.innerText = "Caption del Video";
                    document.getElementById('body').value = config.caption || "";
                }
            } else {
                labelMedia.innerText = "URL de Multimedia";
                mediaInput.placeholder = "https://...";
                labelBody.innerText = "Cuerpo del Mensaje";
            }
            
            // Generador de Variables para Plantillas
            const varsContainer = document.getElementById('vars-container');
            varsContainer.innerHTML = '';
            if (config.vars) {
                config.vars.forEach((v, i) => {
                    varsContainer.innerHTML += `<div><label class="block text-[9px] text-slate-500 mb-1 uppercase font-black tracking-widest">${v}</label>
                    <input type="text" id="v_${i+1}" oninput="updatePreview()" class="w-full p-3 text-xs" placeholder="Variable {{${i+1}}}"></div>`;
                });
            }
            updatePreview();
        }

        function updatePreview() {
            const type = document.getElementById('msgType').value;
            const config = MASTER_CONFIG[type] || {};
            const pMedia = document.getElementById('preview-media');
            const pText = document.getElementById('preview-text');
            const pBtns = document.getElementById('preview-btns');
            const mVal = document.getElementById('mediaUrl').value;

            // Media
            if (config.header) {
                pMedia.style.display = 'flex';
                if ((config.header === 'image' || type === 'image') && mVal.startsWith('http')) {
                    pMedia.innerHTML = `<img src="${mVal}" class="w-full h-full object-cover">`;
                } else {
                    pMedia.innerHTML = `<div class="text-[10px] text-gray-400 font-bold uppercase italic text-center p-4">📎 [${config.header.toUpperCase()}]<br><span class="text-[8px] font-mono">${mVal || 'Esperando...'}</span></div>`;
                }
            } else { pMedia.style.display = 'none'; }

            // Texto
            let textContent = config.isSession ? (document.getElementById('body').value || "Mensaje...") : (config.text || "");
            if (config.vars) {
                config.vars.forEach((_, i) => {
                    const val = document.getElementById(`v_${i+1}`)?.value || `{{${i+1}}}`;
                    textContent = textContent.replace(`{{${i+1}}}`, `<span class="wa-variable">${val}</span>`);
                });
            }
            pText.innerHTML = textContent.replace('{{name}}', '<span class="wa-variable">Cliente</span>');

            // Botones
            pBtns.innerHTML = '';
            if (config.btns) {
                config.btns.forEach(b => { pBtns.innerHTML += `<div class="wa-btn-preview">${b}</div>`; });
            }
        }

        async function initProcess() {
            const btn = document.getElementById('sendBtn');
            const type = document.getElementById('msgType').value;
            const config = MASTER_CONFIG[type] || {};
            btn.disabled = true;
            let contacts = [];

            if (currentMode === 'individual') {
                const fullNum = iti.getNumber();
                if (!iti.isValidNumber()) { alert("Número inválido"); btn.disabled = false; return; }
                contacts.push({ phone: fullNum.replace('+', ''), name: 'Cliente' });
            } else {
                const f = document.getElementById('file').files[0];
                if (!f) { alert("Sube un Excel"); btn.disabled = false; return; }
                const data = await f.arrayBuffer();
                const workbook = XLSX.read(data);
                contacts = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]).map(r => ({
                    phone: String(r.phone || r.telefono || '').replace(/\D/g, ''),
                    name: r.name || r.nombre || 'Cliente'
                })).filter(c => c.phone.length > 5);
            }

            document.getElementById('logs').innerHTML = '';
            let ok = 0;

            for (let c of contacts) {
                renderLog(c.phone, 'Transmitiendo...');
                try {
                    let payload = { 
                        to: c.phone, 
                        type: (type === 'text' || type === 'image' || type === 'document' || type === 'video_session' || type === 'audio_session') ? type.replace('_session', '') : 'template' 
                    };
                    
                    if (payload.type === 'template') {
                        payload.templateName = type === 'tpl_generic' ? document.getElementById('tplName').value : type;
                        payload.vars = [];
                        if (config.vars) {
                            config.vars.forEach((_, i) => {
                                let val = document.getElementById(`v_${i+1}`).value;
                                if (i === 0 && !val) val = c.name;
                                payload.vars.push(val);
                            });
                        }
                        if (config.header) {
                            payload.header = { type: config.header, link: document.getElementById('mediaUrl').value };
                            if (config.header === 'document') payload.header.filename = "NXAI_Document.pdf";
                        }
                    } else if (config.useId) {
                        // Estructura de Audio/Video con ID (Sesión)
                        payload[payload.type] = { id: document.getElementById('mediaUrl').value };
                        if (payload.type === 'video') {
                            payload[payload.type].caption = document.getElementById('body').value;
                        }
                    } else {
                        // Estructura de Texto/Imagen/Doc Estándar
                        if (type === 'text') payload.message = document.getElementById('body').value.replace('{{name}}', c.name);
                        else payload.mediaUrl = document.getElementById('mediaUrl').value;
                    }

                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const resJson = await res.json();
                    if (resJson.code === 0) {
                        ok++;
                        updateLog(c.phone, 'Éxito', 'success', 'bi-check2-all');
                    } else {
                        updateLog(c.phone, resJson.message || 'Error', 'error', 'bi-x-circle');
                    }
                } catch (e) { updateLog(c.phone, 'Error de Red', 'error', 'bi-wifi-off'); }
                
                document.getElementById('counter').innerText = `${ok}/${contacts.length} TRANSMITTED`;
            }
            btn.disabled = false;
        }

        function renderLog(phone, msg) {
            const div = document.createElement('div');
            div.id = `log-${phone}`;
            div.className = 'glass-card p-5 flex justify-between items-center border-l-4 border-slate-600 mb-3 animate-pulse';
            div.innerHTML = `<div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-slate-800 rounded flex items-center justify-center text-[10px] text-blue-400 font-bold">${phone.slice(-4)}</div>
                <div><p class="text-[11px] font-black">+${phone}</p><p id="txt-${phone}" class="text-[9px] text-slate-500 uppercase font-mono italic">${msg}</p></div>
            </div><div id="badge-${phone}" class="status-pill status-waiting">SENDING</div>`;
            document.getElementById('logs').prepend(div);
        }

        function updateLog(phone, msg, status, icon) {
            const row = document.getElementById(`log-${phone}`);
            const badge = document.getElementById(`badge-${phone}`);
            row.classList.remove('animate-pulse');
            row.style.borderLeftColor = status === 'success' ? '#10b981' : '#ef4444';
            badge.className = `status-pill status-${status}`;
            badge.innerHTML = `<i class="bi ${icon}"></i> ${status.toUpperCase()}`;
            document.getElementById(`txt-${phone}`).innerText = msg;
        }

        document.getElementById('file').onchange = (e) => {
            if(e.target.files.length) document.getElementById('file-name').innerText = e.target.files[0].name;
        };
    </script>
</body>
</html>
