<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXAI | Professional Messaging Suite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .gradient-btn { background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%); }
        .iti { width: 100%; }
        input, select, textarea { background: rgba(15, 23, 42, 0.8) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; border-radius: 12px !important; }
        
        /* WhatsApp Preview */
        .wa-container { background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; padding: 20px; border-radius: 20px; border: 8px solid #1e293b; width: 320px; }
        .wa-bubble { background: white; border-radius: 0 12px 12px 12px; padding: 8px; position: relative; color: #333; box-shadow: 0 1px 2px rgba(0,0,0,0.2); width: 100%; }
        .wa-media { width: 100%; height: 140px; background: #f0f0f0; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; overflow: hidden; object-fit: cover; }
        .wa-text { font-size: 13px; line-height: 1.4; white-space: pre-wrap; margin-bottom: 5px; }
        .wa-btn { background: white; border-top: 1px solid #f0f0f0; margin: 5px -8px -8px -8px; padding: 10px; text-align: center; color: #00a5f4; font-size: 13px; font-weight: 600; cursor: default; }
        .wa-btn:first-of-type { border-radius: 0 0 12px 12px; }
        .wa-variable { color: #0ea5e9; font-weight: bold; background: rgba(14, 165, 233, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center"><span class="text-blue-600 font-black text-xl">NX</span></div>
                <h1 class="text-2xl font-extrabold italic">NX<span class="text-blue-400">AI</span> Studio</h1>
            </div>
            <div id="counter" class="font-mono text-[10px] bg-blue-500/10 text-blue-400 px-4 py-2 rounded-full border border-blue-500/20 uppercase tracking-widest italic">Ready to stream</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4 space-y-4">
                <div class="glass-card p-6">
                    <div class="flex gap-2 mb-6">
                        <button onclick="setMode('individual')" id="btn-mode-ind" class="flex-1 p-3 rounded-xl border border-white/10 text-[10px] font-bold uppercase bg-blue-500/20 border-blue-500/50">Individual</button>
                        <button onclick="setMode('bulk')" id="btn-mode-bulk" class="flex-1 p-3 rounded-xl border border-white/10 text-[10px] font-bold uppercase opacity-50">Masivo</button>
                    </div>

                    <div id="ind-target" class="mb-4">
                        <input type="tel" id="phone" class="w-full p-3 text-sm">
                    </div>

                    <div id="bulk-target" class="mb-4 hidden">
                        <input type="file" id="file" class="hidden" accept=".xlsx, .xls, .csv">
                        <div class="border-2 border-dashed border-slate-700 p-4 rounded-xl text-center cursor-pointer hover:border-blue-500" onclick="document.getElementById('file').click()">
                            <p id="file-name" class="text-[10px] text-slate-400 font-mono italic">Cargar Excel (phone, name)</p>
                        </div>
                    </div>

                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">Seleccionar Contenido</label>
                    <select id="msgType" class="w-full p-3 font-bold text-sm mb-4" onchange="buildDynamicInputs()">
                        <optgroup label="Apertura (Fuera de ventana)">
                            <option value="tpl_vyv_1">🚀 VyV_1 (Imagen + 3 Vars)</option>
                            <option value="tpl_promo_video">🎥 Promo Video NXAI</option>
                            <option value="tpl_3cx_pdf">📄 Presentación 3CX (PDF)</option>
                            <option value="tpl_bienvenida">👋 Bienvenida v3</option>
                            <option value="tpl_cta_web">🌐 CTA Web (Botón Link)</option>
                            <option value="tpl_interactivo">🔘 Interactivo (Botones)</option>
                        </optgroup>
                        <optgroup label="Sesión (Dentro de ventana)">
                            <option value="text">💬 Mensaje de Texto Libre</option>
                            <option value="image">🖼️ Imagen (Sesión)</option>
                            <option value="document">📄 Documento PDF (Sesión)</option>
                        </optgroup>
                    </select>

                    <div id="dynamic-inputs" class="space-y-4"></div>

                    <button id="sendBtn" onclick="initProcess()" class="w-full gradient-btn mt-6 py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:scale-[1.02] transition-all">
                        Enviar ahora
                    </button>
                </div>
            </div>

            <div class="lg:col-span-4 flex justify-center items-start">
                <div class="sticky top-8">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest text-center">Live Preview</h3>
                    <div class="wa-container">
                        <div class="wa-bubble">
                            <div id="preview-media" class="wa-media hidden"></div>
                            <div id="preview-body" class="wa-text"></div>
                            <div id="preview-btns"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="glass-card p-6 h-[600px] flex flex-col">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Estado de Transmisión</h3>
                    <div id="logs" class="overflow-y-auto flex-grow custom-scroll space-y-2 pr-2"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const WORKER_URL = 'https://nxlink-backend.ursus006.workers.dev';
        let currentMode = 'individual';
        let iti;

        // Diccionario Maestro de Configuración y Visualización
        const TPL_CONFIG = {
            'text': { header: null, vars: 0, text: "", hasBody: true, btns: [] },
            'image': { header: 'image', vars: 0, text: "", hasBody: false, btns: [] },
            'document': { header: 'document', vars: 0, text: "", hasBody: false, btns: [] },
            'tpl_vyv_1': { name: 'vyv_1', header: 'image', vars: 3, labels: ['Nombre Cliente', 'Vendedor', 'Empresa'], text: "Hola {{1}}, soy {{2}} de {{3}}, te adjunto la info solicitada.", btns: ['Ver Propuesta'] },
            'tpl_promo_video': { name: 'promo_video_nxai', header: 'video', vars: 1, labels: ['Nombre Cliente'], text: "Hola {{1}}, te presento nuestra nueva solución de IA.", btns: ['Solicitar Demo'] },
            'tpl_3cx_pdf': { name: 'presentacion_3cx_pdf', header: 'document', vars: 1, labels: ['Nombre Cliente'], text: "Estimado {{1}}, aquí tienes el brochure de 3CX.", btns: ['Descargar Guía'] },
            'tpl_bienvenida': { name: 'bienvenida_nxai_v3', header: null, vars: 1, labels: ['Nombre Cliente'], text: "¡Hola {{1}}! Gracias por contactar a NXAI. ¿En qué podemos ayudarte?", btns: ['Soporte Técnico', 'Ventas'] },
            'tpl_cta_web': { name: 'nxai_cta_web_v1', header: null, vars: 1, labels: ['Nombre Cliente'], text: "Hola {{1}}, conoce más en nuestra web oficial.", btns: ['🌐 Visitar Web'] },
            'tpl_interactivo': { name: 'nxai_interactivo_v1', header: null, vars: 1, labels: ['Nombre Cliente'], text: "¿{{1}}, estás interesado en continuar el proceso?", btns: ['Sí, claro', 'En otro momento'] }
        };

        window.onload = () => {
            iti = window.intlTelInput(document.querySelector("#phone"), { initialCountry: "pe", separateDialCode: true });
            buildDynamicInputs();
        };

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('ind-target').classList.toggle('hidden', mode !== 'individual');
            document.getElementById('bulk-target').classList.toggle('hidden', mode === 'individual');
            document.getElementById('btn-mode-ind').classList.toggle('bg-blue-500/20', mode === 'individual');
            document.getElementById('btn-mode-bulk').classList.toggle('bg-blue-500/20', mode === 'bulk');
        }

        function buildDynamicInputs() {
            const type = document.getElementById('msgType').value;
            const container = document.getElementById('dynamic-inputs');
            const config = TPL_CONFIG[type];
            container.innerHTML = '';

            // 1. Campo de Media
            if (config.header) {
                container.innerHTML += `<div><label class="block text-[9px] text-slate-500 mb-1 uppercase font-black">URL ${config.header}</label>
                <input type="url" id="media_input" oninput="updatePreview()" class="w-full p-2 text-xs font-mono" placeholder="https://..."></div>`;
            }

            // 2. Campo de Texto (Sesión)
            if (config.hasBody) {
                container.innerHTML += `<div><label class="block text-[9px] text-slate-500 mb-1 uppercase font-black">Mensaje Personalizado</label>
                <textarea id="text_input" oninput="updatePreview()" class="w-full p-2 text-xs" rows="3" placeholder="Usa {{name}} para personalizar"></textarea></div>`;
            }

            // 3. Variables de Plantilla
            for (let i = 1; i <= config.vars; i++) {
                const label = config.labels ? config.labels[i-1] : `Variable ${i}`;
                container.innerHTML += `<div><label class="block text-[9px] text-slate-500 mb-1 uppercase font-black">${label}</label>
                <input type="text" id="var_${i}" oninput="updatePreview()" class="w-full p-2 text-xs" placeholder="Ingresar valor..."></div>`;
            }

            updatePreview();
        }

        function updatePreview() {
            const type = document.getElementById('msgType').value;
            const config = TPL_CONFIG[type];
            const pMedia = document.getElementById('preview-media');
            const pBody = document.getElementById('preview-body');
            const pBtns = document.getElementById('preview-btns');

            // Visualizar Media
            const mediaUrl = document.getElementById('media_input')?.value;
            if (config.header) {
                pMedia.classList.remove('hidden');
                if (config.header === 'image' && mediaUrl) pMedia.innerHTML = `<img src="${mediaUrl}" class="w-full h-full object-cover">`;
                else pMedia.innerHTML = `<div class="p-4 text-center">📎 [${config.header.toUpperCase()}]<br>${mediaUrl ? 'Cargado' : 'Sin URL'}</div>`;
            } else { pMedia.classList.add('hidden'); }

            // Visualizar Cuerpo
            let content = config.hasBody ? (document.getElementById('text_input').value || "Escribe un mensaje...") : config.text;
            for (let i = 1; i <= config.vars; i++) {
                const val = document.getElementById(`var_${i}`)?.value || `{{${i}}}`;
                content = content.replace(`{{${i}}}`, `<span class="wa-variable">${val}</span>`);
            }
            pBody.innerHTML = content.replace('{{name}}', '<span class="wa-variable">Cliente</span>');

            // Visualizar Botones
            pBtns.innerHTML = '';
            config.btns.forEach(btn => {
                pBtns.innerHTML += `<div class="wa-btn">${btn}</div>`;
            });
        }

        async function initProcess() {
            const btn = document.getElementById('sendBtn');
            const selectedType = document.getElementById('msgType').value;
            const config = TPL_CONFIG[selectedType];
            btn.disabled = true;
            let contacts = [];

            if (currentMode === 'individual') {
                const num = iti.getNumber().replace('+', '');
                if (!iti.isValidNumber()) { alert("Número inválido"); btn.disabled = false; return; }
                contacts.push({ phone: num, name: 'Cliente' });
            } else {
                const fInput = document.getElementById('file');
                if (!fInput.files.length) { alert("Sube un Excel"); btn.disabled = false; return; }
                const data = await fInput.files[0].arrayBuffer();
                const workbook = XLSX.read(data);
                contacts = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]).map(r => ({
                    phone: String(r.phone || r.telefono || '').replace(/\D/g, ''),
                    name: r.name || r.nombre || 'Cliente'
                }));
            }

            for (let c of contacts) {
                renderLog(c.phone, 'Iniciando...');
                try {
                    let payload = { to: c.phone, type: selectedType.startsWith('tpl_') ? 'template' : selectedType };
                    
                    if (payload.type === 'template') {
                        payload.templateName = config.name;
                        payload.vars = [];
                        for (let i = 1; i <= config.vars; i++) {
                            let val = document.getElementById(`var_${i}`).value;
                            if (i === 1 && val === "") val = c.name; 
                            payload.vars.push(val);
                        }
                        if (config.header) {
                            payload.header = { type: config.header, link: document.getElementById('media_input').value };
                            if (config.header === 'document') payload.header.filename = "NXAI_Documento.pdf";
                        }
                    } else {
                        if (selectedType === 'text') payload.message = document.getElementById('text_input').value.replace('{{name}}', c.name);
                        if (selectedType === 'image' || selectedType === 'document') payload.mediaUrl = document.getElementById('media_input').value;
                    }

                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const result = await res.json();
                    updateLog(c.phone, result.code === 0 ? 'Entregado' : 'Error Meta', result.code === 0 ? 'success' : 'error');
                } catch (e) { updateLog(c.phone, 'Fallo de Red', 'error'); }
            }
            btn.disabled = false;
        }

        function renderLog(phone, msg) {
            const div = document.createElement('div');
            div.id = `log-${phone}`;
            div.className = 'p-3 bg-white/5 rounded-lg border border-white/5 flex justify-between items-center animate-pulse';
            div.innerHTML = `<div><p class="text-[10px] font-bold text-white">+${phone}</p><p id="txt-${phone}" class="text-[9px] text-slate-500 font-mono italic">${msg}</p></div><div id="st-${phone}" class="w-2 h-2 rounded-full bg-blue-500"></div>`;
            document.getElementById('logs').prepend(div);
        }

        function updateLog(phone, msg, status) {
            const logRow = document.getElementById(`log-${phone}`);
            const txt = document.getElementById(`txt-${phone}`);
            const st = document.getElementById(`st-${phone}`);
            logRow.classList.remove('animate-pulse');
            txt.innerText = msg;
            st.className = `w-2 h-2 rounded-full ${status === 'success' ? 'bg-green-500' : 'bg-red-500'}`;
        }

        document.getElementById('file').onchange = (e) => {
            if(e.target.files.length) document.getElementById('file-name').innerText = e.target.files[0].name;
        };
    </script>
</body>
</html>
