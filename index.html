<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXAI | Enterprise WhatsApp Suite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: #38bdf8;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.1);
        }

        .gradient-text {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary-nx {
            background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
            transition: all 0.2s ease;
        }

        .btn-primary-nx:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            filter: brightness(1.1);
        }

        .btn-primary-nx:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-waiting { background: #334155; color: #94a3b8; }
        .status-success { background: #065f46; color: #34d399; }
        .status-error { background: #7f1d1d; color: #f87171; }

        input, select, textarea {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 12px !important;
        }

        input:focus { border-color: #38bdf8 !important; outline: none; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-2xl">
                    <span class="text-blue-600 font-black text-2xl tracking-tighter">NX</span>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight">NXAI<span class="gradient-text"> Manager</span></h1>
                    <p class="text-slate-400 text-xs font-bold tracking-widest uppercase">Next-Gen Comms</p>
                </div>
            </div>
            <div class="hidden md:block text-right">
                <p class="text-[10px] text-slate-500 font-black uppercase">Service Status</p>
                <div class="text-green-400 text-sm font-bold flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> ONLINE
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 space-y-6">
                <div class="glass-card p-6">
                    <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
                        <i class="bi bi-sliders2-vertical text-blue-400"></i> CONFIGURACIÓN
                    </h2>

                    <div class="mb-6 p-4 bg-white/5 rounded-2xl border border-white/10">
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 ml-1">Número Individual (Perú)</label>
                        <div class="flex gap-2">
                            <div class="relative flex-grow">
                                <span class="absolute left-3 top-3 text-slate-500 font-bold">+</span>
                                <input type="text" id="singlePhone" class="w-full p-3 pl-7 text-sm" placeholder="9XXXXXXXX">
                            </div>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 ml-1">Carga Masiva (Excel/CSV)</label>
                        <div class="border-2 border-dashed border-slate-700 rounded-2xl p-6 text-center hover:border-blue-500 transition-all cursor-pointer bg-slate-900/40" id="dropZone">
                            <i class="bi bi-file-earmark-excel text-3xl text-slate-500 mb-2 block"></i>
                            <input type="file" id="fileInput" class="hidden" accept=".csv, .xlsx, .xls">
                            <p class="text-sm text-slate-300 font-medium" id="fileName">Arrastra tu base de datos aquí</p>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 ml-1">Tipo de Mensaje</label>
                        <select id="msgType" class="w-full p-4 text-sm font-bold cursor-pointer" onchange="toggleInputs()">
                            <option value="template">🚀 PLANTILLA (Recomendado para inicio)</option>
                            <option value="text">💬 TEXTO DE SESIÓN (Solo ventana 24h)</option>
                        </select>
                    </div>

                    <div id="dynamicInputs" class="space-y-4">
                        <div id="tplGroup">
                            <label class="block text-[10px] font-black text-slate-500 uppercase mb-1 ml-1">Nombre del Template</label>
                            <input type="text" id="tplName" class="w-full p-4 font-mono text-xs" placeholder="ej: saludo_general">
                        </div>
                        <div id="textGroup" class="hidden">
                            <label class="block text-[10px] font-black text-slate-500 uppercase mb-1 ml-1">Mensaje Personalizado</label>
                            <textarea id="msgBody" rows="4" class="w-full p-4 text-sm" placeholder="Hola {{name}}..."></textarea>
                        </div>
                    </div>

                    <button id="sendBtn" onclick="executeCampaign()" class="w-full btn-primary-nx mt-8 py-5 rounded-2xl font-black text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                        <i class="bi bi-lightning-charge-fill"></i> EJECUTAR ENVÍOS
                    </button>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="glass-card p-6 h-full flex flex-col min-h-[600px]">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg font-bold flex items-center gap-2">
                            <i class="bi bi-broadcast text-blue-400"></i> LOG DE ACTIVIDAD
                        </h2>
                        <div id="stats" class="text-[10px] font-black text-slate-500">
                            IDLE
                        </div>
                    </div>

                    <div id="logContainer" class="flex-grow overflow-auto space-y-3 pr-2 custom-scrollbar">
                        <div class="text-center py-20 opacity-20 italic">
                            <i class="bi bi-terminal text-5xl block mb-2"></i>
                            Esperando ejecución...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://nxlink-backend.ursus006.workers.dev';

        // 1. Lógica de UI
        function toggleInputs() {
            const isTpl = document.getElementById('msgType').value === 'template';
            document.getElementById('tplGroup').classList.toggle('hidden', !isTpl);
            document.getElementById('textGroup').classList.toggle('hidden', isTpl);
        }

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            if(e.target.files.length) document.getElementById('fileName').innerText = e.target.files[0].name;
        };

        // 2. Formateador de Números (Lógica Perú)
        function cleanPhone(num) {
            let p = num.toString().replace(/\D/g, '');
            if(p.length === 9 && p.startsWith('9')) p = '51' + p;
            return p;
        }

        // 3. Ejecución Principal
        async function executeCampaign() {
            const btn = document.getElementById('sendBtn');
            const single = document.getElementById('singlePhone').value;
            const file = fileInput.files[0];
            
            let contacts = [];
            btn.disabled = true;

            // Procesar contactos
            if(single.trim() !== "") {
                contacts.push({ phone: cleanPhone(single), name: "Cliente" });
            } else if(file) {
                const data = await file.arrayBuffer();
                const wb = XLSX.read(data);
                const ws = wb.Sheets[wb.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(ws);
                contacts = json.map(r => ({
                    phone: cleanPhone(r.phone || r.telefono || r.Telefono || r.Phone || ''),
                    name: r.name || r.nombre || r.Nombre || r.Name || 'Cliente'
                })).filter(c => c.phone !== '');
            } else {
                btn.disabled = false;
                return alert("⚠️ Ingresa un número o carga un Excel.");
            }

            document.getElementById('logContainer').innerHTML = '';
            let ok = 0, err = 0;

            for(let c of contacts) {
                addLogEntry(c.phone, 'Iniciando...');
                
                try {
                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            to: c.phone,
                            type: document.getElementById('msgType').value,
                            templateName: document.getElementById('tplName').value,
                            message: document.getElementById('msgBody').value.replace('{{name}}', c.name),
                            components: [{ type: "body", parameters: [{ type: "text", text: c.name }] }]
                        })
                    });

                    const data = await res.json();
                    if(res.ok && data.code === 0) {
                        ok++;
                        updateLogEntry(c.phone, 'Entregado', 'success', 'bi-check2-all');
                    } else {
                        err++;
                        updateLogEntry(c.phone, data.message || 'Bloqueado por política', 'error', 'bi-shield-exclamation');
                    }
                } catch (e) {
                    err++;
                    updateLogEntry(c.phone, 'Fallo de conexión', 'error', 'bi-wifi-off');
                }
                document.getElementById('stats').innerText = `ÉXITOS: ${ok} | ERRORES: ${err}`;
            }
            btn.disabled = false;
        }

        function addLogEntry(phone, msg) {
            const container = document.getElementById('logContainer');
            const div = document.createElement('div');
            div.id = `row-${phone}`;
            div.className = 'glass-card p-4 flex justify-between items-center border-l-4 border-slate-700 animate-pulse';
            div.innerHTML = `
                <div>
                    <p class="text-[10px] font-black text-blue-400 tracking-widest">${phone}</p>
                    <p id="msg-${phone}" class="text-[11px] text-slate-400 mt-1">${msg}</p>
                </div>
                <div id="badge-${phone}" class="status-badge status-waiting">Procesando</div>
            `;
            container.prepend(div);
        }

        function updateLogEntry(phone, msg, type, icon) {
            const badge = document.getElementById(`badge-${phone}`);
            const text = document.getElementById(`msg-${phone}`);
            const card = document.getElementById(`row-${phone}`);
            card.classList.remove('animate-pulse');
            card.style.borderLeftColor = type === 'success' ? '#10b981' : '#ef4444';
            badge.className = `status-badge status-${type}`;
            badge.innerHTML = `<i class="bi ${icon}"></i> ${type === 'success' ? 'OK' : 'FAIL'}`;
            text.innerText = msg;
            if(type === 'error') text.classList.add('text-red-400', 'font-bold');
        }
    </script>
</body>
</html>
