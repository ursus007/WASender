<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXAI | WA Sender</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at 0% 0%, #0f172a 0%, #1e293b 100%); color: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; transition: all 0.4s ease; }
        .glass-card:hover { border-color: #38bdf8; background: rgba(255, 255, 255, 0.04); }
        .gradient-btn { background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .iti { width: 100%; }
        input, select, textarea { background: rgba(15, 23, 42, 0.8) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; border-radius: 14px !important; }
        .status-pill { padding: 2px 10px; border-radius: 99px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        .status-waiting { background: #334155; color: #94a3b8; }
        .status-success { background: #065f46; color: #34d399; }
        .status-error { background: #7f1d1d; color: #f87171; }
        .type-active { border: 2px solid #38bdf8; background: rgba(56, 189, 248, 0.1); }
        
        .wa-chat-bg { background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover; border-radius: 24px; padding: 20px; border: 6px solid #0f172a; width: 100%; max-width: 340px; margin: 0 auto; }
        .wa-bubble { background: white; border-radius: 0 15px 15px 15px; padding: 10px; color: #333; font-size: 13px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.2); }
        .wa-media-box { width: 100%; border-radius: 10px; margin-bottom: 8px; overflow: hidden; background: #eee; display: flex; align-items: center; justify-content: center; min-height: 120px; }
        .wa-btn-preview { border-top: 1px solid #eee; margin: 8px -10px -10px -10px; padding: 10px; text-align: center; color: #00a5f4; font-weight: 600; font-size: 13px; }
        .wa-variable { color: #0ea5e9; font-weight: bold; background: rgba(14, 165, 233, 0.1); border-radius: 3px; padding: 0 2px; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-white rounded-3xl flex items-center justify-center">
                    <span class="text-blue-600 font-black text-3xl">NXAI</span>
                </div>
                <div>
                    <h1 class="text-4xl font-extrabold tracking-tight italic"><span class="text-blue-400 not-italic">NXAI</span></h1>
                    <p class="text-slate-500 text-xs font-bold tracking-[0.3em] uppercase">WhatsApp Demo Sender</p>
                </div>
            </div>
            <div class="flex gap-4 items-center glass-card px-6 py-3">
                <div class="text-right">
                    <p class="text-[10px] text-slate-500 font-bold uppercase italic">Sistema listo</p>
                    <p id="counter" class="text-white font-mono text-lg italic font-black">Disponible</p>
                </div>
                <div class="h-8 w-[1px] bg-slate-700"></div>
                <div class="flex items-center gap-2 text-green-400 font-bold text-sm">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span> ONLINE
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-8">
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button onclick="setMode('individual')" id="btn-mode-ind" class="glass-card p-4 text-center type-active">
                            <i class="bi bi-person-fill text-2xl mb-1 block"></i>
                            <span class="text-[10px] font-bold uppercase">Individual</span>
                        </button>
                        <button onclick="setMode('bulk')" id="btn-mode-bulk" class="glass-card p-4 text-center opacity-50">
                            <i class="bi bi-people-fill text-2xl mb-1 block"></i>
                            <span class="text-[10px] font-bold uppercase">Masivo</span>
                        </button>
                    </div>

                    <div id="ind-target" class="mb-6">
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 italic tracking-widest">Número de WhatsApp</label>
                        <input type="tel" id="phone" class="w-full p-4">
                    </div>

                    <div id="bulk-target" class="mb-6 hidden">
                        <div class="border-2 border-dashed border-slate-700 rounded-2xl p-6 text-center cursor-pointer bg-black/20" onclick="document.getElementById('file').click()">
                            <input type="file" id="file" class="hidden" accept=".xlsx, .xls">
                            <i class="bi bi-cloud-arrow-up text-2xl text-slate-500 mb-2 block"></i>
                            <p id="file-name" class="text-xs text-slate-400 italic uppercase">Cargar Excel de Contactos</p>
                        </div>
                    </div>

                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 italic">Plantillas Disponibles</label>
                    <select id="msgType" class="w-full p-4 font-bold mb-6" onchange="toggleContentFields()">
                        <optgroup label="Apertura (Fuera de ventana)">
                            <option value="soporte_nxai_v1">🛠️ Plantilla Utility</option>
                            <option value="vyv_1">🚀 Plantilla de imagen</option>
                            <option value="promo_video_nxai">🎥 Plantilla de Video</option>
                            <option value="nxai_cta_web_v1">🌐 Plantilla CTA Web</option>
                            <option value="nxai_cta_phone_v1">📞 Plantilla CTA Phone</option>
                            <option value="nxai_solutions_v4">🎠 Plantilla Carrusel</option>
                            <option value="nxai_interactivo_v1">🔘 Plantilla Interactiva</option>
                            <option value="presentacion_3cx_pdf">📄 Plantilla Documento</option>
                        </optgroup>
                        <optgroup label="Sesión (Dentro de ventana de conversación)">
                            <option value="text">💬 Mensaje de Texto</option>
                            <option value="image_free">🖼️ Imagen</option>
                            <option value="document">📄 Documento PDF</option>
                            <option value="video_session">🎥 Video</option>
                            <option value="audio_session">🎵 Audio</option>
                        </optgroup>
                    </select>

                    <div id="content-fields" class="space-y-4">
                        <div id="group-text" class="hidden">
                            <label id="label-body" class="block text-[10px] font-black text-slate-500 uppercase mb-1 italic">Cuerpo del Mensaje</label>
                            <textarea id="body" rows="3" oninput="updatePreview()" class="w-full p-4 text-sm" placeholder="Usa {{name}} para personalizar"></textarea>
                        </div>

                        <div id="vars-container" class="space-y-3"></div>
                    </div>

                    <button id="sendBtn" onclick="initProcess()" class="w-full gradient-btn mt-10 py-5 rounded-2xl font-black text-sm uppercase tracking-widest transition-transform active:scale-95">
                        <i class="bi bi-lightning-fill"></i> Enviar mensaje
                    </button>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="sticky top-10">
                    <h2 class="text-center text-[10px] font-black text-slate-500 uppercase mb-6 italic tracking-widest">Vista Previa del mensaje</h2>
                    <div class="wa-chat-bg">
                        <div class="wa-bubble">
                            <div id="preview-media" class="wa-media-box"></div>
                            <div id="preview-text"></div>
                            <div id="preview-btns" class="flex flex-col"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="glass-card p-8 h-[650px] flex flex-col">
                    <h2 class="text-sm font-black text-blue-400 uppercase mb-6 italic flex items-center gap-2">
                        <i class="bi bi-terminal"></i> Estado de Transmisión
                    </h2>
                    <div id="logs" class="flex-grow space-y-4 overflow-y-auto pr-2 custom-scroll">
                        <div class="text-center py-20 opacity-20">
                            <i class="bi bi-broadcast text-6xl block mb-4"></i>
                            <p class="font-mono text-[10px] uppercase">Enviando...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    const WORKER_URL = 'https://nxlink-backend.ursus006.workers.dev';
    let currentMode = 'individual';
    let iti;

    const MASTER_CONFIG = {
        'soporte_nxai_v1': { header: null, vars: ['Nombre Cliente', 'Departamento', 'Ticket ID'], text: "Hola {{1}}, tu solicitud para {{2}} ha sido registrada con el ID: {{3}}.", btns: ['Ver Estado'] },
        'vyv_1': { header: 'image', mediaUrl: 'https://i.postimg.cc/W3D7tWCX/logo.png', vars: ['Nombre', 'Vendedor', 'Empresa'], text: "Hola {{1}}, soy {{2}} de {{3}}, te adjunto la info solicitada.", btns: ['Ver Propuesta'] },
        // --- CAMBIO AQUÍ: Plantilla de Video configurada ---
        'promo_video_nxai': { 
            header: 'video', 
            mediaUrl: 'https://pub-0b132dbccbaa45b8b000d404a2b4157a.r2.dev/Instalar_Extension.mp4', 
            vars: ['Nombre'], 
            text: "Hola {{1}}, ¡mira este video exclusivo!", 
            btns: ['Solicitar'] 
        },
        'nxai_cta_web_v1': { header: null, vars: ['Nombre'], text: "Hola {{1}}, conoce más en nuestra web.", btns: ['Ir a Web'] },
        'nxai_cta_phone_v1': { header: null, vars: ['Nombre'], text: "Hola {{1}}, ¿prefieres una llamada?", btns: ['Llamar Ahora'] },
        'nxai_solutions_v4': { header: 'image', mediaUrl: 'https://i.postimg.cc/W3D7tWCX/logo.png', vars: ['Nombre'], text: "Hola {{1}}, estas son nuestras soluciones.", btns: ['Ver Demo', 'Asesor'] },
        'nxai_interactivo_v1': { header: null, vars: ['Nombre'], text: "¿Quieres que te contactemos, {{1}}?", btns: ['Sí', 'No'] },
        'presentacion_3cx_pdf': { header: 'document', mediaUrl: 'https://i.postimg.cc/W3D7tWCX/logo.png', vars: ['Nombre'], text: "Hola {{1}}, adjunto el PDF de 3CX.", btns: ['Descargar Brochure'] },
        'text': { header: null, isSession: true },
        'image_free': { header: 'image', isSession: true, id: '1249420694060125', caption: "image test", isFreeMedia: true },
        'document': { header: 'document', isSession: true, id: '4393679207510947', filename: 'NXAI-VyV' },
        'video_session': { header: 'video', isSession: true, id: '929780379973389', caption: "Instalar extensión NXLink" },
        'audio_session': { header: 'audio', isSession: true, id: '2368122460364431' }
    };

    window.onload = () => {
        iti = window.intlTelInput(document.querySelector("#phone"), { 
            initialCountry: "pe", 
            separateDialCode: true,
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/utils.js"
        });
        toggleContentFields();
    };

    function setMode(m) {
        currentMode = m;
        document.getElementById('ind-target').classList.toggle('hidden', m !== 'individual');
        document.getElementById('bulk-target').classList.toggle('hidden', m === 'individual');
        document.getElementById('btn-mode-ind').classList.toggle('type-active', m === 'individual');
        document.getElementById('btn-mode-bulk').classList.toggle('type-active', m === 'bulk');
    }

    function toggleContentFields() {
        const type = document.getElementById('msgType').value;
        const config = MASTER_CONFIG[type] || {};
        const groupText = document.getElementById('group-text');
        const labelBody = document.getElementById('label-body');
        
        groupText.classList.toggle('hidden', !config.isSession || (config.isFreeMedia && !config.caption) || type === 'document' || type === 'audio_session');
        
        if (type === 'image_free' || type === 'video_session') {
            labelBody.innerText = "Caption del Media";
            document.getElementById('body').value = config.caption || "";
        } else {
            labelBody.innerText = "Cuerpo del Mensaje";
        }

        const varsContainer = document.getElementById('vars-container');
        varsContainer.innerHTML = '';
        if (config.vars) {
            config.vars.forEach((v, i) => {
                varsContainer.innerHTML += `<div><label class="block text-[9px] text-slate-500 mb-1 uppercase font-black tracking-widest">${v}</label>
                <input type="text" id="v_${i+1}" oninput="updatePreview()" class="w-full p-3 text-xs" placeholder="Valor para {{${i+1}}}"></div>`;
            });
        }
        updatePreview();
    }

    // --- MEJORA: Soporte visual para video en preview ---
    function updatePreview() {
        const type = document.getElementById('msgType').value;
        const config = MASTER_CONFIG[type] || {};
        const pMedia = document.getElementById('preview-media');
        const pText = document.getElementById('preview-text');
        const pBtns = document.getElementById('preview-btns');

        if (config.header || config.isFreeMedia) {
            pMedia.style.display = 'flex';
            if (config.mediaUrl) {
                if (config.header === 'video') {
                    pMedia.innerHTML = `<video src="${config.mediaUrl}" class="w-full h-full object-cover" muted autoplay loop></video>`;
                } else {
                    pMedia.innerHTML = `<img src="${config.mediaUrl}" class="w-full h-full object-cover">`;
                }
            } else {
                const icon = config.header === 'video' ? 'bi-play-circle-fill' : 'bi-paperclip';
                pMedia.innerHTML = `<div class="text-[10px] text-gray-400 font-bold uppercase italic text-center p-4">
                    <i class="bi ${icon} text-2xl block mb-1"></i> [${(config.header || 'IMAGE').toUpperCase()}]<br>
                    <span class="text-[8px] font-mono">${config.id || 'READY'}</span>
                </div>`;
            }
        } else { pMedia.style.display = 'none'; }

        let content = "";
        if (config.isSession) {
            if (type === 'text') content = document.getElementById('body').value || "Escribe tu mensaje...";
            else if (config.isFreeMedia || type === 'video_session') content = document.getElementById('body').value || config.caption || "";
            else if (type === 'document') content = `<span class="italic text-slate-400">📄 ${config.filename}.pdf</span>`;
        } else {
            content = config.text || "";
            if (config.vars) {
                config.vars.forEach((_, i) => {
                    const val = document.getElementById(`v_${i+1}`)?.value || `{{${i+1}}}`;
                    content = content.replace(`{{${i+1}}}`, `<span class="wa-variable">${val}</span>`);
                });
            }
        }
        pText.innerHTML = content;

        pBtns.innerHTML = '';
        if (config.btns) {
            config.btns.forEach(b => { pBtns.innerHTML += `<div class="wa-btn-preview">${b}</div>`; });
        }
    }

    async function initProcess() {
        const btn = document.getElementById('sendBtn');
        const type = document.getElementById('msgType').value;
        const config = MASTER_CONFIG[type] || {};
        btn.disabled = true;
        let contacts = [];

        if (currentMode === 'individual') {
            const full = iti.getNumber();
            if (!iti.isValidNumber()) { alert("Número inválido"); btn.disabled = false; return; }
            contacts.push({ phone: full.replace('+', ''), name: 'Cliente' });
        } else {
            const f = document.getElementById('file').files[0];
            if (!f) { alert("Carga un Excel"); btn.disabled = false; return; }
            const data = await f.arrayBuffer();
            const workbook = XLSX.read(data);
            contacts = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]).map(r => ({
                phone: String(r.phone || r.telefono || '').replace(/\D/g, ''),
                name: r.name || r.nombre || 'Cliente'
            })).filter(c => c.phone.length >= 9);
        }

        for (let c of contacts) {
            renderLog(c.phone, 'Transmitiendo...');
            try {
                let payload = { to: c.phone };
                
                if (config.isSession) {
                    payload.type = type === 'image_free' ? 'image' : type.replace('_session','');
                    if (config.id) {
                        payload[payload.type] = { id: config.id };
                        if (payload.type === 'image' || payload.type === 'video') {
                            payload[payload.type].caption = document.getElementById('body').value;
                        }
                        if (type === 'document') payload[payload.type].filename = config.filename;
                    } else if (type === 'text') {
                        payload.message = document.getElementById('body').value;
                    }
                } else {
                    payload.type = 'template';
                    payload.templateName = type;
                    payload.vars = config.vars.map((_, i) => document.getElementById(`v_${i+1}`).value || (i === 0 ? c.name : 'Val'));
                    if (config.header) payload.header = { type: config.header, link: config.mediaUrl };
                }

                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const resJson = await res.json();
                if (resJson.code === 0) updateLog(c.phone, 'ÉXITO', 'success', 'bi-check2-all');
                else updateLog(c.phone, resJson.message || 'Error', 'error', 'bi-x-circle');
            } catch (e) { updateLog(c.phone, 'Error de Red', 'error', 'bi-wifi-off'); }
        }
        btn.disabled = false;
    }

    function renderLog(phone, msg) {
        const div = document.createElement('div');
        div.id = `log-${phone}`;
        div.className = 'glass-card p-5 flex justify-between items-center border-l-4 border-slate-600 mb-3 animate-pulse';
        div.innerHTML = `<div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-slate-800 rounded flex items-center justify-center text-[10px] text-blue-400 font-bold">${phone.slice(-4)}</div>
            <div><p class="text-[11px] font-black">+${phone}</p><p id="txt-${phone}" class="text-[9px] text-slate-500 uppercase font-mono italic">${msg}</p></div>
        </div><div id="badge-${phone}" class="status-pill status-waiting">PROCESSING</div>`;
        document.getElementById('logs').prepend(div);
    }

    function updateLog(phone, msg, status, icon) {
        const row = document.getElementById(`log-${phone}`);
        if (!row) return;
        const badge = document.getElementById(`badge-${phone}`);
        row.classList.remove('animate-pulse');
        row.style.borderLeftColor = status === 'success' ? '#10b981' : '#ef4444';
        badge.className = `status-pill status-${status}`;
        badge.innerHTML = `<i class="bi ${icon}"></i> ${status.toUpperCase()}`;
        document.getElementById(`txt-${phone}`).innerText = msg;
    }

    document.getElementById('file').onchange = (e) => {
        if(e.target.files.length) document.getElementById('file-name').innerText = e.target.files[0].name;
    };
</script>
</body>
</html>
