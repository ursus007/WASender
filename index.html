<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXLink - WhatsApp Sender</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
            <div class="mb-8 text-center">
                <h1 class="text-2xl font-bold text-gray-800">NXLink Gateway</h1>
                <p class="text-gray-500 text-sm">Envío de plantillas individuales</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Número de destino</label>
                    <input type="text" id="phone" placeholder="Ej: 51939579468" 
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Mensaje (Body)</label>
                    <textarea id="message" rows="3" placeholder="Escribe tu mensaje aquí..."
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none transition">demo NXAAI Peru</textarea>
                </div>

                <button onclick="sendTemplate()" id="sendBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-200 flex justify-center items-center">
                    Enviar WhatsApp
                </button>
            </div>

            <div id="status" class="mt-6 hidden p-4 rounded-md text-sm text-center"></div>
        </div>
    </div>

    <script>
        async function sendTemplate() {
            const btn = document.getElementById('sendBtn');
            const status = document.getElementById('status');
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;

            if (!phone) {
                alert("Por favor ingresa un número");
                return;
            }

            // UI State
            btn.disabled = true;
            btn.innerText = "Enviando...";
            status.classList.add('hidden');

            try {
                const response = await fetch('https://nxlink-backend.ursus006.workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ to: phone, message: message })
                });

                const data = await response.json();

                status.classList.remove('hidden');
                if (data.code === "0" || data.result === "success" || response.ok) {
                    status.className = "mt-6 p-4 rounded-md text-sm text-center bg-green-100 text-green-800";
                    status.innerText = "¡Mensaje enviado con éxito!";
                } else {
                    throw new Error(data.msg || "Error en el envío");
                }
            } catch (error) {
                status.classList.remove('hidden');
                status.className = "mt-6 p-4 rounded-md text-sm text-center bg-red-100 text-red-800";
                status.innerText = "Error: " + error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar WhatsApp";
            }
        }
    </script>
</body>
</html>
