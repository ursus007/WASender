<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXAI | Pro Messaging Suite</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .gradient-btn { background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%); }
        .iti { width: 100%; }
        input, select, textarea { background: rgba(15, 23, 42, 0.8) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; border-radius: 12px !important; }
        
        /* WhatsApp Preview Styles */
        .wa-bubble { background: #075e54; border-radius: 0 15px 15px 15px; position: relative; max-width: 280px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .wa-header { background: #128c7e; border-radius: 15px 15px 0 0; padding: 10px; font-size: 11px; font-weight: bold; }
        .wa-body { padding: 12px; font-size: 13px; line-height: 1.4; background: #dcf8c6; color: #333; border-radius: 0 0 15px 15px; }
        .wa-variable { color: #0ea5e9; font-weight: bold; background: rgba(14, 165, 233, 0.1); padding: 0 2px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center"><span class="text-blue-600 font-black text-xl">NX</span></div>
                <h1 class="text-2xl font-extrabold italic">NX<span class="text-blue-400">AI</span> <span class="text-[10px] not-italic text-slate-500 tracking-widest uppercase ml-2">Studio</span></h1>
            </div>
            <div id="counter" class="font-mono text-xs bg-blue-500/10 text-blue-400 px-4 py-2 rounded-full border border-blue-500/20">READY</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4 space-y-4">
                <div class="glass-card p-6">
                    <div class="flex gap-2 mb-6">
                        <button onclick="setMode('individual')" id="btn-mode-ind" class="flex-1 p-3 rounded-xl border border-white/10 text-[10px] font-bold uppercase bg-blue-500/20 border-blue-500/50">Individual</button>
                        <button onclick="setMode('bulk')" id="btn-mode-bulk" class="flex-1 p-3 rounded-xl border border-white/10 text-[10px] font-bold uppercase opacity-50">Masivo</button>
                    </div>

                    <div id="ind-target" class="mb-4">
                        <input type="tel" id="phone" class="w-full p-3">
                    </div>

                    <div id="bulk-target" class="mb-4 hidden">
                        <input type="file" id="file" class="hidden" accept=".xlsx, .xls, .csv">
                        <div class="border-2 border-dashed border-slate-700 p-4 rounded-xl text-center cursor-pointer hover:border-blue-500" onclick="document.getElementById('file').click()">
                            <p id="file-name" class="text-[10px] text-slate-400 font-mono">Subir Excel (phone, name)</p>
                        </div>
                    </div>

                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">Seleccionar Plantilla</label>
                    <select id="msgType" class="w-full p-3 font-bold text-sm mb-4" onchange="buildDynamicInputs()">
                        <option value="text">💬 Mensaje de Texto (Sesión)</option>
                        <option value="image">🖼️ Imagen Libre (Sesión)</option>
                        <option value="tpl_vyv_1">🚀 VyV_1 (Imagen + 3 Vars)</option>
                        <option value="tpl_promo_video">🎥 Promo Video (Video + 1 Var)</option>
                        <option value="tpl_3cx_pdf">📄 Presentación 3CX (PDF + 1 Var)</option>
                        <option value="tpl_bienvenida">👋 Bienvenida v3 (1 Var)</option>
                        <option value="tpl_cta_web">🌐 CTA Web v1 (1 Var)</option>
                        <option value="tpl_interactivo">🔘 Interactivo (1 Var)</option>
                    </select>

                    <div id="dynamic-inputs" class="space-y-4"></div>

                    <button id="sendBtn" onclick="initProcess()" class="w-full gradient-btn mt-6 py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:scale-105 transition-all">
                        Enviar ahora
                    </button>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="glass-card p-6 sticky top-8">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase mb-6 tracking-widest text-center">Vista Previa Móvil</h3>
                    <div class="flex justify-center">
                        <div class="wa-bubble">
                            <div id="preview-header" class="wa-header hidden"></div>
                            <div id="preview-body" class="wa-body italic text-slate-400">Selecciona una plantilla para previsualizar...</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="glass-card p-6 h-[600px] flex flex-col">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Consola de Transmisión</h3>
                    <div id="logs" class="overflow-y-auto flex-grow custom-scroll space-y-2"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const WORKER_URL = 'https://nxlink-backend.ursus006.workers.dev';
        let currentMode = 'individual';
        let iti;

        // Diccionario Maestro de Plantillas
        const TPL_CONFIG = {
            'text': { header: null, vars: 0, text: "Escribe tu mensaje libre...", hasBody: true },
            'image': { header: 'image', vars: 0, text: "Mensaje de sesión con imagen", hasBody: false },
            'tpl_vyv_1': { name: 'vyv_1', header: 'image', vars: 3, labels: ['Nombre Cliente', 'Vendedor', 'Empresa'], text: "Hola {{1}}, soy {{2}} de {{3}}, te adjunto la info." },
            'tpl_promo_video': { name: 'promo_video_nxai', header: 'video', vars: 1, labels: ['Nombre Cliente'], text: "Hola {{1}}, mira este video de NXAI." },
            'tpl_3cx_pdf': { name: 'presentacion_3cx_pdf', header: 'document', vars: 1, labels: ['Nombre Cliente'], text: "Hola {{1}}, te envío el PDF de 3CX." },
            'tpl_bienvenida': { name: 'bienvenida_nxai_v3', header: null, vars: 1, labels: ['Nombre Cliente'], text: "¡Bienvenido {{1}} al soporte de NXAI!" },
            'tpl_cta_web': { name: 'nxai_cta_web_v1', header: null, vars: 1, labels: ['Nombre Cliente'], text: "Hola {{1}}, visita nuestra web aquí abajo." },
            'tpl_interactivo': { name: 'nxai_interactivo_v1', header: null, vars: 1, labels: ['Nombre Cliente'], text: "Estimado {{1}}, ¿Deseas continuar?" }
        };

        window.onload = () => {
            iti = window.intlTelInput(document.querySelector("#phone"), { initialCountry: "pe", separateDialCode: true });
            buildDynamicInputs();
        };

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('ind-target').classList.toggle('hidden', mode !== 'individual');
            document.getElementById('bulk-target').classList.toggle('hidden', mode === 'individual');
            document.getElementById('btn-mode-ind').classList.toggle('bg-blue-500/20', mode === 'individual');
            document.getElementById('btn-mode-bulk').classList.toggle('bg-blue-500/20', mode === 'bulk');
        }

        // --- GENERADOR DINÁMICO DE INPUTS Y PREVIEW ---
        function buildDynamicInputs() {
            const type = document.getElementById('msgType').value;
            const container = document.getElementById('dynamic-inputs');
            const config = TPL_CONFIG[type];
            container.innerHTML = '';

            // 1. Campo para Media (Imagen/Video/PDF)
            if (config.header) {
                const label = config.header.toUpperCase();
                container.innerHTML += `<div><label class="block text-[9px] text-slate-500 mb-1">URL ${label}</label>
                <input type="url" id="media_input" oninput="updatePreview()" class="w-full p-2 text-xs" placeholder="https://..."></div>`;
            }

            // 2. Campo para Texto Libre (Si es sesión)
            if (config.hasBody) {
                container.innerHTML += `<div><label class="block text-[9px] text-slate-500 mb-1">MENSAJE</label>
                <textarea id="text_input" oninput="updatePreview()" class="w-full p-2 text-xs" rows="3"></textarea></div>`;
            }

            // 3. Generar inputs para Variables ({{1}}, {{2}}...)
            for (let i = 1; i <= config.vars; i++) {
                const label = config.labels ? config.labels[i-1] : `Variable ${i}`;
                container.innerHTML += `<div><label class="block text-[9px] text-slate-500 mb-1">${label}</label>
                <input type="text" id="var_${i}" oninput="updatePreview()" class="w-full p-2 text-xs" placeholder="Ej: Valor ${i}"></div>`;
            }

            updatePreview();
        }

        function updatePreview() {
            const type = document.getElementById('msgType').value;
            const config = TPL_CONFIG[type];
            const pHeader = document.getElementById('preview-header');
            const pBody = document.getElementById('preview-body');

            // Header Preview
            if (config.header) {
                pHeader.classList.remove('hidden');
                pHeader.innerHTML = `<span class="opacity-50">📎 [${config.header.toUpperCase()}]</span>`;
            } else { pHeader.classList.add('hidden'); }

            // Body Preview con reemplazo dinámico
            let content = config.text || document.getElementById('text_input')?.value || "";
            for (let i = 1; i <= config.vars; i++) {
                const val = document.getElementById(`var_${i}`)?.value || `(Var ${i})`;
                content = content.replace(`{{${i}}}`, `<span class="wa-variable">${val}</span>`);
            }
            pBody.innerHTML = content;
        }

        async function initProcess() {
            const btn = document.getElementById('sendBtn');
            const selectedType = document.getElementById('msgType').value;
            const config = TPL_CONFIG[selectedType];
            btn.disabled = true;
            let contacts = [];

            // Obtener Contactos
            if (currentMode === 'individual') {
                const num = iti.getNumber().replace('+', '');
                if (!iti.isValidNumber()) { alert("Número inválido"); btn.disabled = false; return; }
                contacts.push({ phone: num, name: 'Cliente' });
            } else {
                const fInput = document.getElementById('file');
                if (!fInput.files.length) { alert("Sube un Excel"); btn.disabled = false; return; }
                const data = await fInput.files[0].arrayBuffer();
                const workbook = XLSX.read(data);
                contacts = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]).map(r => ({
                    phone: String(r.phone || r.telefono || '').replace(/\D/g, ''),
                    name: r.name || r.nombre || 'Cliente'
                }));
            }

            for (let c of contacts) {
                renderLog(c.phone, 'Transmitiendo...');
                try {
                    let payload = { to: c.phone, type: selectedType.startsWith('tpl_') ? 'template' : selectedType };
                    
                    if (payload.type === 'template') {
                        payload.templateName = config.name;
                        // Mapear variables dinámicas
                        payload.vars = [];
                        for (let i = 1; i <= config.vars; i++) {
                            // Si la primera variable es el nombre, lo tomamos del Excel automáticamente
                            let val = document.getElementById(`var_${i}`).value;
                            if (i === 1 && val === "") val = c.name; 
                            payload.vars.push(val);
                        }
                        if (config.header) {
                            payload.header = { type: config.header, link: document.getElementById('media_input').value };
                            if (config.header === 'document') payload.header.filename = "NXAI_Info.pdf";
                        }
                    } else {
                        if (selectedType === 'text') payload.message = document.getElementById('text_input').value.replace('{{name}}', c.name);
                        if (selectedType === 'image') payload.mediaUrl = document.getElementById('media_input').value;
                    }

                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const result = await res.json();
                    updateLog(c.phone, result.code === 0 ? 'Entregado' : 'Error Meta', result.code === 0 ? 'success' : 'error');
                } catch (e) { updateLog(c.phone, 'Fallo de Red', 'error'); }
            }
            btn.disabled = false;
        }

        // --- SISTEMA DE LOGS ---
        function renderLog(phone, msg) {
            const div = document.createElement('div');
            div.id = `log-${phone}`;
            div.className = 'p-3 bg-white/5 rounded-lg border border-white/5 flex justify-between items-center';
            div.innerHTML = `<div><p class="text-[10px] font-bold text-white">${phone}</p><p id="txt-${phone}" class="text-[9px] text-slate-500 font-mono">${msg}</p></div><div id="st-${phone}" class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>`;
            document.getElementById('logs').prepend(div);
        }

        function updateLog(phone, msg, status) {
            const txt = document.getElementById(`txt-${phone}`);
            const st = document.getElementById(`st-${phone}`);
            txt.innerText = msg;
            st.classList.remove('animate-pulse', 'bg-blue-500');
            st.classList.add(status === 'success' ? 'bg-green-500' : 'bg-red-500');
        }

        document.getElementById('file').onchange = (e) => {
            if(e.target.files.length) document.getElementById('file-name').innerText = e.target.files[0].name;
        };
    </script>
</body>
</html>
