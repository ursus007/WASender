<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXAI | Global Messaging Engine</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/css/intlTelInput.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/intlTelInput.min.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f8fafc; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .iti { width: 100%; }
        .iti__country-list { background: #1e293b; color: white; border: 1px solid #334155; }
        input, select, textarea { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; border-radius: 12px !important; }
        .btn-nx { background: linear-gradient(135deg, #0ea5e9, #6366f1); transition: 0.3s; }
        .btn-nx:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
        .success { background: #065f46; color: #34d399; }
        .error { background: #7f1d1d; color: #f87171; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-extrabold italic">NX<span class="text-blue-400">AI</span> <span class="text-sm font-light not-italic text-slate-500 uppercase ml-2 tracking-widest">v2.0 Global</span></h1>
            <div class="text-green-400 text-xs font-bold flex items-center gap-2">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-ping"></span> SISTEMA ACTIVO
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="glass p-8">
                <div class="mb-6">
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">Destinatario</label>
                    <div class="flex flex-col gap-4">
                        <input type="tel" id="phoneInput" class="w-full p-4">
                        <div class="text-center text-slate-600 text-[10px] font-bold">O CARGAR BASE MASIVA</div>
                        <input type="file" id="excelInput" class="hidden" accept=".xlsx, .xls, .csv">
                        <button onclick="document.getElementById('excelInput').click()" id="fileStatus" class="w-full p-3 border-2 border-dashed border-slate-700 rounded-xl text-xs text-slate-400">
                            <i class="bi bi-file-earmark-excel mr-2"></i> Click para subir Excel
                        </button>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">Tipo de Envío</label>
                    <select id="msgType" class="w-full p-4 text-sm font-bold" onchange="toggleUI()">
                        <option value="template_cta3">🚀 PLANTILLA: cta_3 (Apertura)</option>
                        <option value="text">💬 TEXTO LIBRE (Solo si hay sesión)</option>
                        <option value="image">🖼️ IMAGEN (Solo si hay sesión)</option>
                    </select>
                </div>

                <div id="textFields" class="hidden mb-6">
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Mensaje o URL</label>
                    <textarea id="msgBody" rows="3" class="w-full p-4 text-sm" placeholder="Escribe aquí o pega URL..."></textarea>
                </div>

                <button id="sendBtn" onclick="processAll()" class="w-full btn-nx py-5 rounded-2xl font-black text-sm uppercase tracking-widest mt-4">
                    Iniciar Transmisión
                </button>
            </div>

            <div class="glass p-8 overflow-hidden flex flex-col h-[600px]">
                <h2 class="text-xs font-black text-slate-500 uppercase mb-4 tracking-tighter">Log de Envío en Tiempo Real</h2>
                <div id="logBox" class="flex-grow overflow-y-auto space-y-3 pr-2 custom-scroll">
                    <div class="text-center opacity-20 py-20 italic text-sm">Esperando acción...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://nxlink-backend.ursus006.workers.dev';
        let iti;

        // Inicializar Banderas
        window.onload = () => {
            const input = document.querySelector("#phoneInput");
            iti = window.intlTelInput(input, {
                initialCountry: "pe",
                separateDialCode: true,
                utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@19.2.16/build/js/utils.js",
            });
        };

        // Mostrar/Ocultar campos según el tipo
        function toggleUI() {
            const type = document.getElementById('msgType').value;
            document.getElementById('textFields').classList.toggle('hidden', type === 'template_cta3');
        }

        // Actualizar nombre del archivo
        document.getElementById('excelInput').onchange = (e) => {
            if(e.target.files.length) document.getElementById('fileStatus').innerText = "✅ " + e.target.files[0].name;
        };

        async function processAll() {
            const btn = document.getElementById('sendBtn');
            const logBox = document.getElementById('logBox');
            const excelFile = document.getElementById('excelInput').files[0];
            const singlePhone = iti.getNumber();
            
            let queue = [];
            btn.disabled = true;
            logBox.innerHTML = '';

            // 1. Determinar lista de contactos
            if (singlePhone && iti.isValidNumber()) {
                queue.push({ phone: singlePhone.replace('+', ''), name: 'Cliente' });
            } else if (excelFile) {
                const data = await excelFile.arrayBuffer();
                const wb = XLSX.read(data);
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                queue = json.map(r => ({
                    phone: String(r.phone || r.telefono || '').replace(/\D/g, ''),
                    name: r.name || r.nombre || 'Cliente'
                })).filter(q => q.phone.length > 6);
            } else {
                alert("⚠️ Ingresa un número válido o sube un Excel.");
                btn.disabled = false;
                return;
            }

            // 2. Procesar Envío
            for (let c of queue) {
                const rowId = `row-${c.phone}`;
                addLogRow(rowId, c.phone, 'Sincronizando...');

                try {
                    const selectedType = document.getElementById('msgType').value;
                    
                    // PAYLOAD INTELIGENTE (LA CLAVE)
                    let payload = { to: c.phone };

                    if (selectedType === 'template_cta3') {
                        payload.type = "template"; // Forzamos tipo template para evitar el bloqueo del Worker
                        payload.templateName = "cta_3";
                        payload.components = [{ type: "body", parameters: [{ type: "text", text: c.name }] }];
                    } else {
                        payload.type = selectedType;
                        if (selectedType === 'text') payload.message = document.getElementById('msgBody').value.replace('{{name}}', c.name);
                        else payload.mediaUrl = document.getElementById('msgBody').value;
                    }

                    const res = await fetch(WORKER_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });

                    const data = await res.json();

                    if (res.ok && data.code === 0) {
                        updateLogRow(rowId, 'Entregado con éxito', 'success');
                    } else {
                        updateLogRow(rowId, data.message || 'Error de política', 'error');
                    }
                } catch (e) {
                    updateLogRow(rowId, 'Fallo de conexión', 'error');
                }
            }
            btn.disabled = false;
        }

        function addLogRow(id, phone, msg) {
            const div = document.createElement('div');
            div.id = id;
            div.className = 'p-4 glass flex justify-between items-center animate-pulse border-l-4 border-blue-500';
            div.innerHTML = `<div><p class="text-xs font-bold">+${phone}</p><p class="text-[10px] text-slate-500 msg-txt">${msg}</p></div><div class="status-badge bg-slate-800">Procesando</div>`;
            document.getElementById('logBox').prepend(div);
        }

        function updateLogRow(id, msg, status) {
            const row = document.getElementById(id);
            row.classList.remove('animate-pulse');
            row.style.borderLeftColor = status === 'success' ? '#10b981' : '#ef4444';
            row.querySelector('.msg-txt').innerText = msg;
            const badge = row.querySelector('.status-badge');
            badge.className = `status-badge ${status}`;
            badge.innerText = status === 'success' ? 'ENVIADO' : 'FALLIDO';
        }
    </script>
</body>
</html>
